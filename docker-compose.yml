name: biomeclaw

x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/home/nanobot/.nanobot
  environment:
    MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
    HEALTH_VAULT_KEY: ${HEALTH_VAULT_KEY:-}
    HEALTH_ONBOARDING_BASE_URL: ${HEALTH_ONBOARDING_BASE_URL:-}
    APP_RELEASE: ${APP_RELEASE:-}
    APP_DEPLOYED_AT: ${APP_DEPLOYED_AT:-}
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  redis:
    image: redis:7-alpine
    container_name: biomeclaw-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: biomeclaw-postgres
    environment:
      POSTGRES_DB: nanohealth
      POSTGRES_USER: nanohealth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nanohealth}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  orchestrator:
    <<: *common-config
    container_name: biomeclaw-orchestrator
    depends_on:
      - postgres
      - redis
    user: "0:0"
    cap_add:
      - SYS_ADMIN
      - DAC_OVERRIDE
    entrypoint: ["python", "-m", "uvicorn"]
    command: ["nanobot.health.api:create_app", "--factory", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - ~/.nanobot:/home/nanobot/.nanobot
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      HEALTH_VAULT_KEY: ${HEALTH_VAULT_KEY:-}
      HEALTH_ONBOARDING_BASE_URL: ${HEALTH_ONBOARDING_BASE_URL:-}
      NANOBOT_WORKSPACE: /home/nanobot/.nanobot/workspace
      NANOBOT_HEALTH_INSTANCE_IMAGE: ${NANOBOT_HEALTH_INSTANCE_IMAGE:-nanobot-orchestrator:latest}
      NANOBOT_HEALTH_REGISTRY_URL: ${NANOBOT_HEALTH_REGISTRY_URL:-postgresql://nanohealth:${POSTGRES_PASSWORD:-nanohealth}@postgres:5432/nanohealth}
      ARQ_REDIS_URL: ${ARQ_REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2.9-alpine
    container_name: biomeclaw-caddy
    depends_on:
      - orchestrator
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/health/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    <<: *common-config
    container_name: biomeclaw-worker
    depends_on:
      - postgres
      - redis
    entrypoint: ["python", "-m", "nanobot.health.worker"]
    volumes:
      - ~/.nanobot:/home/nanobot/.nanobot
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      HEALTH_VAULT_KEY: ${HEALTH_VAULT_KEY:-}
      HEALTH_ONBOARDING_BASE_URL: ${HEALTH_ONBOARDING_BASE_URL:-}
      NANOBOT_WORKSPACE: /home/nanobot/.nanobot/workspace
      NANOBOT_HEALTH_INSTANCE_IMAGE: ${NANOBOT_HEALTH_INSTANCE_IMAGE:-nanobot-orchestrator:latest}
      NANOBOT_HEALTH_REGISTRY_URL: ${NANOBOT_HEALTH_REGISTRY_URL:-postgresql://nanohealth:${POSTGRES_PASSWORD:-nanohealth}@postgres:5432/nanohealth}
      ARQ_REDIS_URL: ${ARQ_REDIS_URL:-redis://redis:6379/0}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
  pg_data:
