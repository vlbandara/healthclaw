x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/home/nanobot/.nanobot
  environment:
    MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
    HEALTH_VAULT_KEY: ${HEALTH_VAULT_KEY:-}
    HEALTH_ONBOARDING_BASE_URL: ${HEALTH_ONBOARDING_BASE_URL:-}
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  orchestrator:
    <<: *common-config
    container_name: nanohealth-orchestrator
    entrypoint: ["python", "-m", "uvicorn"]
    command: ["nanobot.health.api:create_app", "--factory", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      HEALTH_VAULT_KEY: ${HEALTH_VAULT_KEY:-}
      HEALTH_ONBOARDING_BASE_URL: ${HEALTH_ONBOARDING_BASE_URL:-}
      NANOBOT_WORKSPACE: /home/nanobot/.nanobot/workspace
      NANOBOT_HEALTH_INSTANCE_IMAGE: ${NANOBOT_HEALTH_INSTANCE_IMAGE:-nanobot-ai:latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2.9-alpine
    container_name: nanobot-caddy
    depends_on:
      - orchestrator
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/health/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
