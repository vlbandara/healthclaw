apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthclaw-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: healthclaw-worker
  template:
    metadata:
      labels:
        app: healthclaw-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/vlbandara/healthclaw:latest
          args: ["healthclaw", "worker"]
          env:
            - name: NANOBOT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: healthclaw-secrets
                  key: database_url
            - name: ARQ_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: healthclaw-secrets
                  key: redis_url
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: healthclaw-secrets
                  key: langfuse_public_key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: healthclaw-secrets
                  key: langfuse_secret_key
            - name: LANGFUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: healthclaw-secrets
                  key: langfuse_host
