apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthclaw-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthclaw-gateway
  template:
    metadata:
      labels:
        app: healthclaw-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/vlbandara/healthclaw:latest
          args: ["healthclaw", "serve", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          env:
            - name: NANOBOT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: healthclaw-secrets
                  key: database_url
            - name: ARQ_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: healthclaw-secrets
                  key: redis_url
            - name: NANOBOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healthclaw-secrets
                  key: api_key
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: healthclaw-gateway
spec:
  selector:
    app: healthclaw-gateway
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
