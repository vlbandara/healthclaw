<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create account — Healthclaw</title>
    <link rel="stylesheet" href="/static/tokens.css" />
    <link rel="stylesheet" href="/static/onboard.css" />
    <link rel="stylesheet" href="/static/companion.css" />
    <link rel="stylesheet" href="/static/auth.css" />
  </head>
  <body class="auth-body">
    {% from "_companion.html" import companion %}

    <div class="auth-card">
      <div class="auth-brand">
        <a class="auth-brand__logo" href="/">
          <span class="auth-brand__name">Healthclaw</span>
        </a>
      </div>

      <div class="auth-companion">
        {{ companion('happy', 'companion-wrap--sm') }}
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Your companion stays private and self-hosted.</p>

      <form class="auth-form" id="signup-form" novalidate>
        <div class="auth-field">
          <label for="name">Your name</label>
          <input
            id="name"
            name="name"
            type="text"
            autocomplete="name"
            placeholder="Alex"
            required
          />
        </div>

        <div class="auth-field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="auth-field auth-field--password">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="At least 8 characters"
            required
            minlength="8"
          />
          <button
            type="button"
            class="auth-pw-toggle"
            id="pw-toggle"
            aria-label="Show password"
          >
            <svg id="pw-icon-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="pw-icon-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>

        <div class="auth-field">
          <label for="timezone">Your timezone</label>
          <input
            id="timezone"
            name="timezone"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="Asia/Colombo"
          />
        </div>

        <button class="auth-btn" type="submit" id="submit-btn">Create account</button>

        <p class="auth-status" id="status" role="alert" aria-live="polite"></p>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>

    <script src="/static/signup.js"></script>
  </body>
</html>
