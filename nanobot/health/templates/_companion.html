{# Reusable companion mascot. Pass state: idle|happy|thinking|concerned|sleepy|celebrating and optional size_class: companion-wrap--sm|--lg #}
{% macro companion(state='idle', size_class='') %}
<div class="companion-wrap {{ size_class }}" data-state="{{ state }}" role="img" aria-label="Healthclaw companion">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" class="companion-svg" aria-hidden="true">
    <defs>
      <radialGradient id="nhCompanionGlow" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#f4e8d4"/>
        <stop offset="55%" stop-color="#c8e6d4"/>
        <stop offset="100%" stop-color="#7eb89a"/>
      </radialGradient>
      <filter id="nhCompanionSoft" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="1.2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g class="companion-body">
      <ellipse cx="60" cy="68" rx="44" ry="40" fill="url(#nhCompanionGlow)" filter="url(#nhCompanionSoft)"/>
      <ellipse class="companion-shadow" cx="60" cy="102" rx="28" ry="6" fill="rgba(32,48,40,0.12)"/>
    </g>
    <g class="companion-face">
      <g class="companion-eyes">
        <ellipse class="companion-eye companion-eye-l" cx="44" cy="58" rx="7" ry="9" fill="#203028"/>
        <ellipse class="companion-eye companion-eye-r" cx="76" cy="58" rx="7" ry="9" fill="#203028"/>
        <ellipse class="companion-pupil companion-pupil-l" cx="45" cy="60" rx="2.5" ry="3" fill="#fffdf8"/>
        <ellipse class="companion-pupil companion-pupil-r" cx="77" cy="60" rx="2.5" ry="3" fill="#fffdf8"/>
      </g>
      <path class="companion-brow companion-brow-l" d="M36 48 Q44 44 52 48" fill="none" stroke="#203028" stroke-width="2.2" stroke-linecap="round" opacity="0"/>
      <path class="companion-brow companion-brow-r" d="M68 48 Q76 44 84 48" fill="none" stroke="#203028" stroke-width="2.2" stroke-linecap="round" opacity="0"/>
      <path class="companion-mouth" d="M48 78 Q60 86 72 78" fill="none" stroke="#203028" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <g class="companion-sparkles" opacity="0">
      <circle cx="22" cy="32" r="2" fill="#f4d03f"/>
      <circle cx="98" cy="28" r="1.5" fill="#f4d03f"/>
      <circle cx="104" cy="48" r="2" fill="#85c1e9"/>
    </g>
  </svg>
</div>
{% endmacro %}
