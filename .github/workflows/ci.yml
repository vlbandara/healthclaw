name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DOMAIN: example.com
      HEALTH_VAULT_KEY: test-health-vault-key
      POSTGRES_PASSWORD: test-postgres-password
      HEALTH_ONBOARDING_BASE_URL: https://example.com
      APP_RELEASE: ci
      APP_DEPLOYED_AT: 2026-01-01T00:00:00Z
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run Ruff
        run: uv run --extra dev ruff check nanobot tests

      - name: Build Python package
        run: uv build

      - name: Validate Docker Compose config
        run: docker compose --env-file .env.example config >/dev/null

      - name: Build bridge
        working-directory: bridge
        run: |
          npm ci
          npm run build
          npm audit --audit-level=critical

      - name: Smoke evals
        run: uv run nanobot eval run --dataset smoke

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run --extra dev pytest -q --cov=nanobot --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
