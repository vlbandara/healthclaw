name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DOMAIN: example.com
      HEALTH_VAULT_KEY: test-health-vault-key
      POSTGRES_PASSWORD: test-postgres-password
      HEALTH_ONBOARDING_BASE_URL: https://example.com
      APP_RELEASE: ci
      APP_DEPLOYED_AT: 2026-01-01T00:00:00Z
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bridge/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run Ruff
        run: uv run ruff check nanobot tests

      - name: Build Python package
        run: uv build

      - name: Validate docker compose config
        run: docker compose config

      - name: Build bridge
        working-directory: bridge
        run: |
          npm ci
          npm run build

      - name: Smoke evals
        run: uv run nanobot eval run --dataset smoke

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -q

  # Bring the full stack up from the compose file and confirm it serves.
  smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build orchestrator

      - name: Start stack
        run: docker compose up -d --wait

      - name: Run smoke test
        run: ./scripts/smoke.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  # Publish a multi-arch image to GHCR on pushes to the default branch and tags.
  image:
    runs-on: ubuntu-latest
    needs: [quality, smoke]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (lean, default)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NANOBOT_BUILD_BRIDGE=0
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (with WhatsApp bridge)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            NANOBOT_BUILD_BRIDGE=1
          tags: ghcr.io/${{ github.repository }}:latest-bridge
          cache-from: type=gha
          cache-to: type=gha,mode=max
