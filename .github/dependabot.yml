version: 2
updates:
  # Python (root project)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # TypeScript WhatsApp bridge
  - package-ecosystem: npm
    directory: "/bridge"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      bridge-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-all:
        patterns:
          - "*"
