# Production overlay: TLS termination + public hostname.
#
# Usage:
#   DOMAIN=health.example.com \
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Caddy fetches and renews a Let's Encrypt certificate for $DOMAIN automatically
# and reverse-proxies to the orchestrator. See docs/SELF_HOSTING.md.

services:
  orchestrator:
    environment:
      HEALTH_ONBOARDING_BASE_URL: ${HEALTH_ONBOARDING_BASE_URL:-https://${DOMAIN:?set DOMAIN to your public hostname}}
    # Orchestrator is only reachable through Caddy in production.
    # `!reset` replaces the base port list rather than appending to it.
    ports: !reset []

  caddy:
    image: caddy:2.9-alpine
    container_name: healthclaw-caddy
    depends_on:
      - orchestrator
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN to your public hostname}
    volumes:
      - ./deploy/health/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
